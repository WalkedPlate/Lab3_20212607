<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp"
          crossorigin="anonymous">
    <title>Clinica</title>
</head>
<body>
<nav class="navbar navbar-expand" style="background-color: #c1d6fa;">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{'/'}">
            Laboratorio 3
        </a>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{'/clinica'}">Clinica</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{'/oftalmologo'}">Oftalmologo</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{'/paciente'}">Paciente</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div style="padding-bottom: 15px;" class="container">
    <div style="text-align: center;"><h2>Editar Pacienter</h2></div>
    <form method="post" th:action="@{/paciente/guardar}" th:object="${paciente}">
        <input type="hidden" th:field="*{idPaciente}">

        <div class="mb-3">
            <label for="fecha_cita">Fecha</label>
            <input id="fecha_cita" type="text" class="form-control" name="fecha_cita" th:field="*{fecha_cita}">
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/paciente}" class="btn btn-danger">Cancelar</a>
    </form>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-qKXV1j0HvMUeCBQ+QVp7JcfGl760yU08IQ+GpUo5hlbpg51QRiuqHAJz8+BrxE/N"
        crossorigin="anonymous"></script>
</body>
</html>
