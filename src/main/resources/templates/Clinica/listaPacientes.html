<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp"
          crossorigin="anonymous">
    <title>Oftalmologo</title>
</head>
<body>
<nav class="navbar navbar-expand" style="background-color: #c1d6fa;">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{'/'}">
            Laboratorio 3
        </a>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{'/clinica'}">Clinica</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{'/oftalmologo'}">Oftalmologo</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{'/paciente'}">Paciente</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div style="text-align: center;"><h1>Lista de Pacientes</h1></div>
    <table class="table table-striped">
        <tr>
            <th>#</th>
            <th>Nombre </th>
            <th>Edad </th>
            <th>Genero </th>
            <th>Diagnostico </th>
            <th>Fecha Cita </th>
            <th>Numero de habitacion </th>
            <th>Oftalmólogo </th>
            <th>Clínica </th>


        </tr>
        <tr th:each="paciente, obj : ${listaPacientes}">
            <td th:text="${obj.index+1}"> </td>
            <td th:text="${paciente.nombre}"></td>
            <td th:text="${paciente.edad}"></td>
            <td th:text="${paciente.genero}"></td>
            <td th:text="${paciente.diagnostico}"></td>
            <td th:text="${paciente.fechaCita}"></td>
            <td th:text="${paciente.numeroHabitacion}"></td>
            <td th:text="${paciente.oftalmologoId}"></td>
            <td th:text="${paciente.clinicaId}"></td>

        </tr>
    </table>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-qKXV1j0HvMUeCBQ+QVp7JcfGl760yU08IQ+GpUo5hlbpg51QRiuqHAJz8+BrxE/N"
        crossorigin="anonymous"></script>
</body>
</html>
